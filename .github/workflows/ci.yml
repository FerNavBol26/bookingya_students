name: Bookingya CI/CD Pipeline

on:
  push:
    branches: [ "main", "estudiantes" ]
  pull_request:
    branches: [ "main", "estudiantes" ]

jobs:
  # Stage 1: Build
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Build with Maven
        run: mvn -B clean compile -DskipTests

  # Stage 2: Test Fase 1 (TDD - Unit Tests)
  test-fase-1:
    name: Fase 1 - TDD
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Run Unit Tests
        run: mvn -B test -Dtest=*ServiceTest --file pom.xml

  # Stage 3: Test Fase 2 (BDD - Acceptance Tests)
  test-fase-2:
    name: Fase 2 - BDD
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Run Acceptance Tests
        run: mvn -B test -Dtest=*AcceptanceTest --file pom.xml

  # Stage 4: Test Fase 3 (ATDD - Integration Tests)
  test-fase-3:
    name: Fase 3 - ATDD
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Run Integration Tests
        run: mvn -B verify --file pom.xml
      
      - name: Validate Project
        run: mvn clean install -DskipTests -q

  # Final Summary
  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [build, test-fase-1, test-fase-2, test-fase-3]
    if: always()

    steps:
      - name: Pipeline Results
        run: |
          BUILD_STATUS="${{ needs.build.result }}"
          FASE1_STATUS="${{ needs.test-fase-1.result }}"
          FASE2_STATUS="${{ needs.test-fase-2.result }}"
          FASE3_STATUS="${{ needs.test-fase-3.result }}"
          
          echo "=========================================="
          echo "PIPELINE TEST RESULTS"
          echo "=========================================="
          echo "Build: $BUILD_STATUS"
          echo "Fase 1 - Unit Tests: $FASE1_STATUS"
          echo "Fase 2 - Acceptance Tests: $FASE2_STATUS"
          echo "Fase 3 - Integration Tests: $FASE3_STATUS"
          echo "=========================================="
          
          if [ "$BUILD_STATUS" = "success" ] && [ "$FASE1_STATUS" = "success" ] && [ "$FASE2_STATUS" = "success" ] && [ "$FASE3_STATUS" = "success" ]; then
            echo "All tests passed successfully"
            exit 0
          else
            echo "Some tests failed - check logs"
            exit 1
          fi
